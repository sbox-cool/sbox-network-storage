sourceVersion: 1
kind: library
id: economy
name: Economy Helpers
description: Shared endpoint blocks for economy examples.
definition:
  blocks:
    profile_exists:
      params:
        player:
          type: object
      steps:
        - id: profile_exists
          type: condition
          check:
            field: "{{player.playerName}}"
            op: exists
          onFail:
            status: 409
            error: PROFILE_MISSING
            message: Profile must be initialized first.
