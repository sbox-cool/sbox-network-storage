sourceVersion: 1
kind: endpoint
id: mine-ore
name: Mine Ore
description: Public game API endpoint that adds ore after validating the profile.
exposure: public
imports:
  - economy
method: POST
input:
  type: object
  properties:
    amount:
      type: number
  required: [ amount ]
steps:
  - id: player
    type: read
    collection: players
    key: "{{steamId}}"
  - id: profile_exists
    type: call
    target: economy.profile_exists
    params:
      player: "{{player}}"
  - id: positive_amount
    type: condition
    check:
      field: "{{input.amount}}"
      op: ">"
      value: 0
    routes:
      false:
        action: reject
        status: 400
        error: INVALID_AMOUNT
        message: Amount must be positive.
        webhook: true
  - id: apply
    type: write
    collection: players
    key: "{{steamId}}"
    ops:
      - op: inc
        path: ores.stone
        value: "{{input.amount}}"
response:
  status: 200
  body:
    ok: true
    mined: "{{input.amount}}"
