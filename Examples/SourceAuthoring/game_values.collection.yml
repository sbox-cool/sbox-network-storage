sourceVersion: 1
kind: collection
id: game_values
name: Game Values
description: Shared tuning data.
definition:
  collectionType: global
  accessMode: public
  maxRecords: 1
  allowRecordDelete: false
  requireSaveVersion: false
  rateLimits:
    mode: none
  schema:
    version:
      type: number
      default: 1
  constants:
    economy:
      startingGold: 0
  tables:
    upgrades:
      columns: [ id, baseCost, costGrowth ]
      rows:
        - [ pickaxe, 10, 1.25 ]
